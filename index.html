<head>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: #e8e8e8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
    }

    .phone-frame {
      width: 375px;
      height: 812px;
      background: var(--color-page-bg);
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    /* Zest Design System Tokens */
    :root {
      /* Page / Elevation */
      --color-page-bg: #faf8f3;
      --color-elevation-bg: #faf8f3;
      --color-elevation-level-1: #efe9de;
      --color-elevation-level-2: #e0d9cb;
      --color-factor-carbon-100: #f9f9f3;

      /* Neutral foreground */
      --color-neutral-fg-darkest: #232323;
      --color-neutral-fg-default: #242424;
      --color-neutral-fg-darker: #454545;
      --color-neutral-fg-base-alt: #4b4b4b;
      --color-neutral-fg-inverse: #ffffff;
      --color-neutral-fg-unselected: #656565;

      /* Brand */
      --color-brand-primary: #bbf06a;
      --color-brand-green-500: #067a46;
      --color-brand-border-subtle: #8ccf9a;
      --color-selected-bg-primary: #bbf06a;

      /* Tags */
      --color-tag-interactive-bg: #efe9de;
      --color-tag-interactive-fg: #242424;
      --color-tag-static-bg-v0: #e0d9cb;
      --color-tag-static-fg-v0: #232323;
      --color-tag-static-bg-v1: #db1d1d;
      --color-tag-static-fg-v1: #ffffff;
      --color-tag-static-bg-v2: #067a46;
      --color-tag-static-fg-v2: #ffffff;

      /* Divider */
      --color-divider: #c1c1c1;

      /* Bottom nav */
      --color-bottom-nav-bg: #e0d9cb;
      --color-bottom-nav-fg-selected: #232323;
      --color-bottom-nav-fg-unselected: #656565;

      /* Button */
      --color-button-brand-bg-disabled: #adadad;
      --color-button-brand-fg: #ffffff;
      --color-button-border: #232323;

      /* Badge */
      --color-badge-positive-bg: #007838;
      --color-badge-border: #faf8f3;
      --color-badge-fg: #ffffff;

      /* Number stepper */
      --color-stepper-bg: #efe9de;
      --color-stepper-border: #232323;
      --color-stepper-selected-bg: #efe9de;

      /* Icon button toggle */
      --color-icon-btn-toggle-bg: #232323;
      --color-icon-btn-toggle-fg: #ffffff;

      /* Benefits */
      --color-benefits: #b5e7ba;
      --color-purple-100: #f7e9ff;

      /* Tab group */
      --color-tab-fg-selected: #232323;
      --color-tab-fg-unselected: #242424;
      --color-tab-border-selected: #232323;
      --color-tab-border-unselected: #e0e0e0;

      /* Dialog */
      --dialog-overlay: rgba(0, 0, 0, 0.5);

      /* Spacing */
      --spacing-none: 0px;
      --spacing-xxs: 4px;
      --spacing-xs: 8px;
      --spacing-sm-1: 12px;
      --spacing-sm-2: 16px;
      --spacing-md-1: 24px;

      /* Corner radius */
      --radius-card: 12px;
      --radius-button: 8px;
      --radius-tag-rect: 4px;
      --radius-tag-pill: 999px;
      --radius-stepper: 8px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-dialog: 16px;

      /* Typography */
      --font-body: 'Roboto', sans-serif;
      --font-headline: 'Roboto', sans-serif; /* Agrandir substitute */

      --lh-xs: 16px;
      --lh-sm: 20px;
      --lh-md: 24px;
      --lh-lg: 32px;

      --fs-xs: 12px;
      --fs-sm: 14px;
      --fs-md: 16px;
      --fs-lg: 20px;
      --fs-xl: 24px;
    }

    /* Scrollbar styling */
    .scroll-area::-webkit-scrollbar { display: none; }
    .scroll-area { -ms-overflow-style: none; scrollbar-width: none; }
    .h-scroll::-webkit-scrollbar { display: none; }
    .h-scroll { -ms-overflow-style: none; scrollbar-width: none; }

    /* Quality tag animation */
    @keyframes qualityFadeSlideIn {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(-10px) scale(0.8);
      }
      60% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1.1);
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
      }
    }
    @keyframes qualityWiggle {
      0%, 100% {
        transform: translateX(-50%) translateY(0) rotate(0deg);
      }
      20% {
        transform: translateX(calc(-50% + 3px)) translateY(0) rotate(2deg);
      }
      40% {
        transform: translateX(calc(-50% - 3px)) translateY(0) rotate(-2deg);
      }
      60% {
        transform: translateX(calc(-50% + 2px)) translateY(0) rotate(1deg);
      }
      80% {
        transform: translateX(calc(-50% - 2px)) translateY(0) rotate(-1deg);
      }
    }
    @keyframes qualityGlow {
      0%, 100% {
        box-shadow: 0 2px 8px rgba(6, 122, 70, 0.3);
      }
      50% {
        box-shadow: 0 4px 16px rgba(6, 122, 70, 0.6), 0 0 24px rgba(6, 122, 70, 0.3);
      }
    }
    @keyframes diamondSparkle {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
      25% { transform: scale(1.2) rotate(10deg); opacity: 1; }
      50% { transform: scale(1) rotate(0deg); opacity: 0.8; }
      75% { transform: scale(1.2) rotate(-10deg); opacity: 1; }
    }
    @keyframes sparkleFloat {
      0% { opacity: 0; transform: scale(0) translateY(0); }
      50% { opacity: 1; transform: scale(1) translateY(-5px); }
      100% { opacity: 0; transform: scale(0) translateY(-10px); }
    }
    .quality-tag {
      opacity: 0;
      animation: qualityFadeSlideIn 0.6s ease-out 1s forwards, qualityWiggle 0.5s ease-in-out 1.6s 2, qualityGlow 2s ease-in-out 2.5s 2;
    }
    .quality-icon {
      animation: diamondSparkle 1.5s ease-in-out 1.6s 3;
    }
    .sparkle-left, .sparkle-right {
      animation: sparkleFloat 0.8s ease-out 1.7s forwards;
    }

    /* Organic info drawer slide animation */
    @keyframes slideInFromRight {
      0% {
        transform: translateX(100%);
      }
      100% {
        transform: translateX(0);
      }
    }
    .organic-drawer-enter {
      animation: slideInFromRight 0.3s ease-out forwards;
    }
    @keyframes confetti-fall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(600px) rotate(720deg);
        opacity: 0;
      }
    }
    @keyframes cartBounce {
      0% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
      60% { transform: translateY(2px); }
      100% { transform: translateY(0); }
    }
    .cart-bounce {
      animation: cartBounce 0.3s ease-out;
    }
  </style>
</head>

    // ========== PRODUCT CARD ==========
    function ProductCard({ meal, quantity, onAdd, onRemove }) {
      const [isEditing, setIsEditing] = useState(false);
      const editTimeoutRef = useRef(null);

      const handleAdd = () => {
        onAdd();
        setIsEditing(true);
        // Auto-hide stepper after 3 seconds of inactivity
        if (editTimeoutRef.current) clearTimeout(editTimeoutRef.current);
        editTimeoutRef.current = setTimeout(() => setIsEditing(false), 3000);
      };

      const handleRemove = () => {
        onRemove();
        // Reset timeout
        if (editTimeoutRef.current) clearTimeout(editTimeoutRef.current);
        editTimeoutRef.current = setTimeout(() => setIsEditing(false), 3000);
      };

      const handleBadgeClick = () => {
        setIsEditing(true);
        if (editTimeoutRef.current) clearTimeout(editTimeoutRef.current);
        editTimeoutRef.current = setTimeout(() => setIsEditing(false), 3000);
      };

      // Close editing when quantity becomes 0
      useEffect(() => {
        if (quantity === 0) setIsEditing(false);
      }, [quantity]);

      return (
        <div style={{
          background: 'var(--color-elevation-bg)',
          borderRadius: 'var(--radius-card)',
          overflow: 'hidden',
          display: 'flex',
          flexDirection: 'column',
        }}>
          {/* Image area */}
          <div style={{
            width: '100%',
            aspectRatio: '4/5',
            overflow: 'hidden',
            position: 'relative',
            background: '#e8dcd0',
            borderRadius: '0 6px 0 8px',
          }}>
            {meal.video ? (
              <video
                src={meal.video}
                autoPlay
                loop
                muted
                playsInline
                style={{ width: '100%', height: '100%', objectFit: 'cover', borderRadius: '0 6px 0 8px' }}
              />
            ) : (
              <img
                src={meal.img}
                alt={meal.name}
                style={{ width: '100%', height: '100%', objectFit: 'cover', borderRadius: '0 6px 0 8px' }}
                onError={(e) => { e.target.style.display = 'none'; }}
              />

            {/* Promo label on image - bottom left */}
            {meal.label && (
              <div style={{
                position: 'absolute',
                bottom: 0,
                left: 8,
                background: 'rgba(255, 255, 255, 0.9)',
                borderRadius: 'var(--radius-tag-rect) var(--radius-tag-rect) 0 0',
                padding: '0 3px 0 3px',

            {/* Quantity control */}
            <div style={{ position: 'absolute', top: 0, right: 0 }}>
              {quantity === 0 ? (
                /* State 1: Not selected - show plus button */
                <button onClick={handleAdd} style={{
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  width: 36,
                  height: 36,
                  background: 'var(--color-stepper-bg)',
                  borderLeft: '1px solid var(--color-stepper-border)',

                <div style={{
                  display: 'flex',

                  borderLeft: '1px solid var(--color-stepper-border)',

                  }}>
                    {Icons.minus(16, 'var(--color-neutral-fg-darkest)')}

                  <span style={{
                    width: 20, textAlign: 'center',
                    fontFamily: 'var(--font-body)', fontSize: 'var(--fs-sm)', fontWeight: 700,
                    color: 'var(--color-neutral-fg-darkest)',

                  <button onClick={handleAdd} style={{

            <span style={{

                fontFamily: 'var(--font-body)',
                fontSize: 10,
                fontWeight: 400,
                color: '#666666',
              }}>{meal.kcal}</span>
              <span style={{
                fontFamily: 'var(--font-body)',
                fontSize: 10,
                fontWeight: 400,
                color: '#666666',
              }}>{meal.protein}</span>
            </div>
            {/* Surcharge for Premium */}
            {meal.surcharge && (
              <span style={{
                fontFamily: 'var(--font-body)',
                fontSize: 11,
                fontWeight: 700,
                color: 'var(--color-neutral-fg-default)',

    // ========== MEAL SELECTION GUIDANCE ==========
    function MealSelectionGuidance({ totalItems, mealsNeeded, onCartClick }) {
      const remaining = Math.max(0, mealsNeeded - totalItems);
      const isComplete = remaining === 0;
      const [isAnimating, setIsAnimating] = useState(false);
      const prevTotalRef = useRef(totalItems);

      useEffect(() => {
        if (prevTotalRef.current !== totalItems) {
          setIsAnimating(true);
          const timer = setTimeout(() => setIsAnimating(false), 400);
          prevTotalRef.current = totalItems;
          return () => clearTimeout(timer);
        }
      }, [totalItems]);

      return (
        <div style={{
          position: 'absolute',
          bottom: 83,
          left: 8,
          right: 8,
          background: 'var(--color-elevation-level-1)',
          borderRadius: 'var(--radius-md)',

          zIndex: 10,

          <div style={{ display: 'flex', gap: 8, alignItems: 'stretch' }}>
            {/* Cart CTA */}
            <button
              onClick={onCartClick}
              className={isAnimating ? 'cart-bounce' : ''}
              style={{
              display: 'flex',
              alignItems: 'center',
              gap: 8,
              padding: '8px 24px',
              border: '1px solid var(--color-button-border)',
              borderRadius: 'var(--radius-button)',
              background: 'var(--color-elevation-level-1)',
              cursor: 'pointer',
              position: 'relative',
              flexShrink: 0,
            }}>
              {Icons.cart(24, 'var(--color-neutral-fg-darkest)')}

              {/* Badge */}
              {totalItems >= 0 && (
                <span
                  style={{
                    position: 'absolute',
                    top: 2,
                    left: 37,
                    display: 'inline-flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    minWidth: 16,
                    height: 16,
                    padding: '0 4px',
                    background: 'var(--color-badge-positive-bg)',

    // ========== MENU PAGE ==========
    function MenuPage({ cart, setCart, onCartClick }) {
      const [showExitDialog, setShowExitDialog] = useState(false);
      const [customizeMeal, setCustomizeMeal] = useState(null);
      const MEALS_NEEDED = 6;

      const totalItems = Object.values(cart).reduce((sum, q) => sum + q, 0);
      const mealsRemaining = Math.max(0, MEALS_NEEDED - totalItems);

      const addToCart = (id) => setCart(prev => ({ ...prev, [id]: (prev[id] || 0) + 1 }));
      const removeFromCart = (id) => setCart(prev => {
        const c = { ...prev };
        if (c[id] > 1) c[id] -= 1;
        else delete c[id];
        return c;
      });

      const handleAddMeal = (meal) => {
        if (meal.id === 1 && (cart[meal.id] || 0) === 0) {
          setCustomizeMeal(meal);
        } else {
          addToCart(meal.id);
        }
      };

      return (
        <>
          <StatusBar />
          <WeekNavigation />

          {/* Scrollable content area */}
          <div className="scroll-area" style={{
            position: 'absolute',

                    onAdd={() => handleAddMeal(meal)}
                    onRemove={() => removeFromCart(meal.id)}

                ))}
              </div>

              <BenefitsWidget />

                    quantity={cart[meal.id] || 0}
                    onAdd={() => handleAddMeal(meal)}
                    onRemove={() => removeFromCart(meal.id)}
                  />
                ))}
              </div>
            </div>
          </div>

          <MealSelectionGuidance totalItems={totalItems} mealsNeeded={MEALS_NEEDED} onCartClick={onCartClick} />

          <CustomizationDrawer
            meal={customizeMeal}
            isOpen={customizeMeal !== null}
            onClose={() => setCustomizeMeal(null)}
            onAdd={() => addToCart(customizeMeal.id)}

        </>
      );

    // ========== MAIN APP ==========
    function App() {
      const [currentPage, setCurrentPage] = useState('home');
      const [cart, setCart] = useState({ 2: 1, 3: 1 });
      const [showCart, setShowCart] = useState(false);

      const totalItems = Object.values(cart).reduce((sum, q) => sum + q, 0);

      const handleNavClick = (label) => {
        if (label === 'Home') setCurrentPage('home');
        else if (label === 'Menu') setCurrentPage('menu');
        else alert(`Navigating to ${label}...`);
      };

      const addToCart = (id) => setCart(prev => ({ ...prev, [id]: (prev[id] || 0) + 1 }));
      const removeFromCart = (id) => setCart(prev => {
        const c = { ...prev };
        if (c[id] > 1) c[id] -= 1;
        else delete c[id];
        return c;
      });

      return (
        <div className="phone-frame">
          {currentPage === 'home' ? (
            <HomePage onNavigateToMenu={() => setCurrentPage('menu')} />
          ) : (
            <MenuPage
              cart={cart}
              setCart={setCart}
              onCartClick={() => setShowCart(true)}
            />
          )}

          <BottomNavigation
            onNavClick={handleNavClick}
            activePage={currentPage}
          />

          <CartDrawer
            isOpen={showCart}
            onClose={() => setShowCart(false)}
            cart={cart}
            mealsData={mealsData}
            onRemove={removeFromCart}
            onAdd={addToCart}
          />
        </div>
      );
