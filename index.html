    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: #e8e8e8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
    }

    .phone-frame {
      width: 375px;
      height: 812px;
      background: var(--color-page-bg);
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    /* Zest Design System Tokens */
    :root {
      /* Page / Elevation */
      --color-page-bg: #f5f5f0;
      --color-elevation-bg: #faf8f3;
      --color-elevation-level-1: #efe9de;
      --color-elevation-level-2: #e0d9cb;
      --color-factor-carbon-100: #f9f9f3;

      /* Neutral foreground */
      --color-neutral-fg-darkest: #024426;
      --color-neutral-fg-default: #242424;
      --color-neutral-fg-darker: #454545;
      --color-neutral-fg-base-alt: #4b4b4b;
      --color-neutral-fg-inverse: #ffffff;
      --color-neutral-fg-unselected: #656565;

      /* Brand */
      --color-brand-primary: #bbf06a;
      --color-brand-green-500: #067a46;
      --color-brand-bg: #067a46; /* Zest: alias.color.brand.background.default */
      --color-brand-border-subtle: #8ccf9a;
      --color-selected-bg-primary: #bbf06a;

      /* Tags */
      --color-tag-interactive-bg: #efe9de;
      --color-tag-interactive-fg: #242424;
      --color-tag-static-bg-v0: #e0d9cb;
      --color-tag-static-fg-v0: #024426;
      --color-tag-static-bg-v1: #db1d1d;
      --color-tag-static-fg-v1: #ffffff;
      --color-tag-static-bg-v2: #067a46;
      --color-tag-static-fg-v2: #ffffff;

      /* Divider */
      --color-divider: #c1c1c1;

      /* Bottom nav */
      --color-bottom-nav-bg: #e0d9cb;
      --color-bottom-nav-fg-selected: #024426;
      --color-bottom-nav-fg-unselected: #656565;

      /* Button */
      --color-button-brand-bg-disabled: #adadad;
      --color-button-brand-fg: #ffffff;
      --color-button-border: #024426;

      /* Badge */
      --color-badge-positive-bg: #007838;
      --color-badge-border: #faf8f3;
      --color-badge-fg: #ffffff;

      /* Number stepper */
      --color-stepper-bg: #efe9de;
      --color-stepper-border: #024426;
      --color-stepper-selected-bg: #efe9de;

      /* Icon button toggle */
      --color-icon-btn-toggle-bg: #024426;
      --color-icon-btn-toggle-fg: #ffffff;

      /* Benefits */
      --color-benefits: #b5e7ba;
      --color-purple-100: #f7e9ff;

      /* Tab group */
      --color-tab-fg-selected: #024426;
      --color-tab-fg-unselected: #242424;
      --color-tab-border-selected: #024426;
      --color-tab-border-unselected: #e0e0e0;

      /* Dialog */
      --dialog-overlay: rgba(0, 0, 0, 0.5);

      /* Spacing */
      --spacing-none: 0px;
      --spacing-xxs: 4px;
      --spacing-xs: 8px;
      --spacing-sm-1: 12px;
      --spacing-sm-2: 16px;
      --spacing-md-1: 24px;

      /* Corner radius */
      --radius-card: 12px;
      --radius-button: 8px;
      --radius-tag-rect: 4px;
      --radius-tag-pill: 999px;
      --radius-stepper: 8px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-dialog: 16px;

      /* Typography */
      --font-body: 'Roboto', sans-serif;
      --font-headline: 'Roboto', sans-serif; /* Agrandir substitute */

      --lh-xs: 16px;
      --lh-sm: 20px;
      --lh-md: 24px;
      --lh-lg: 32px;

      --fs-xs: 12px;
      --fs-sm: 14px;
      --fs-md: 16px;
      --fs-lg: 20px;
      --fs-xl: 24px;
    }

    /* Scrollbar styling */
    .scroll-area::-webkit-scrollbar { display: none; }
    .scroll-area { -ms-overflow-style: none; scrollbar-width: none; }
    .h-scroll::-webkit-scrollbar { display: none; }
    .h-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .recipe-scroll::-webkit-scrollbar { display: none; }
    .recipe-scroll { -ms-overflow-style: none; scrollbar-width: none; }

    /* Recipe scroll snap */
    .recipe-scroll {
      scroll-snap-type: x proximity;
      overflow-anchor: none;
    }
    .recipe-scroll > div > div {
      scroll-snap-align: start;
    }

    /* Ensure left nav is hidden by default */
    [class*="recipe-nav-left"] {
      display: none !important;
    }
    [class*="recipe-nav-left"].show {
      display: flex !important;
    }

    /* Recipe nav button animations */
    .recipe-nav-btn {
      transition: transform 0.15s ease, opacity 0.2s ease;
    }
    .recipe-nav-btn:active {
      transform: scale(0.92);
    }
    .recipe-nav-btn svg {
      transition: transform 0.15s ease;
    }
    .recipe-nav-btn:active svg {
      transform: scale(0.9);
    }

    /* Quality tag animation */
    @keyframes qualityFadeSlideIn {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(-10px) scale(0.8);
      }
      60% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1.1);
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
      }
    }
    @keyframes qualityWiggle {
      0%, 100% {
        transform: translateX(-50%) translateY(0) rotate(0deg);
      }
      20% {
        transform: translateX(calc(-50% + 3px)) translateY(0) rotate(2deg);
      }
      40% {
        transform: translateX(calc(-50% - 3px)) translateY(0) rotate(-2deg);
      }
      60% {
        transform: translateX(calc(-50% + 2px)) translateY(0) rotate(1deg);
      }
      80% {
        transform: translateX(calc(-50% - 2px)) translateY(0) rotate(-1deg);
      }
    }
    @keyframes qualityGlow {
      0%, 100% {
        box-shadow: 0 2px 8px rgba(6, 122, 70, 0.3);
      }
      50% {
        box-shadow: 0 4px 16px rgba(6, 122, 70, 0.6), 0 0 24px rgba(6, 122, 70, 0.3);
      }
    }
    @keyframes diamondSparkle {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
      25% { transform: scale(1.2) rotate(10deg); opacity: 1; }
      50% { transform: scale(1) rotate(0deg); opacity: 0.8; }
      75% { transform: scale(1.2) rotate(-10deg); opacity: 1; }
    }
    @keyframes sparkleFloat {
      0% { opacity: 0; transform: scale(0) translateY(0); }
      50% { opacity: 1; transform: scale(1) translateY(-5px); }
      100% { opacity: 0; transform: scale(0) translateY(-10px); }
    }
    .quality-tag {
      opacity: 1;
    }
    .quality-icon {
      /* animation removed */
    }
    .sparkle-left, .sparkle-right {
      /* animation removed */
    }

    /* Organic info drawer slide animation */
    @keyframes slideInFromRight {
      0% {
        transform: translateX(100%);
      }
      100% {
        transform: translateX(0);
      }
    }
    .organic-drawer-enter {
      animation: slideInFromRight 0.3s ease-out forwards;
    }
    @keyframes confetti-fall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(600px) rotate(720deg);
        opacity: 0;
      }
    }
    @keyframes badgePulse {
      0% { transform: scale(1); }
      40% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .badge-pulse {
      animation: badgePulse 0.3s ease-out;
    }
    @keyframes featureTagGlow {
      0%, 100% { box-shadow: 0 0 4px rgba(255, 213, 79, 0.4); }
      50% { box-shadow: 0 0 12px rgba(255, 213, 79, 0.8); }
    }
    .feature-tag-pulse {
      animation: featureTagGlow 2s ease-in-out infinite;
    }

    /* Laurel wreath animation for premium ingredients */
    @keyframes laurelSeparateLeft {
      0% { transform: translateX(8px); }
      100% { transform: translateX(0); }
    }
    @keyframes laurelSeparateRight {
      0% { transform: translateX(-8px); }
      100% { transform: translateX(0); }
    }
    @keyframes laurelTextFadeIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    .laurel-left {
      animation: laurelSeparateLeft 0.5s ease-out 0.3s forwards;
      transform: translateX(8px);
    }
    @keyframes laurelSeparateRightMirrored {
      0% { transform: scaleX(-1) translateX(8px); }
      100% { transform: scaleX(-1) translateX(0); }
    }
    .laurel-right {
      animation: laurelSeparateRightMirrored 0.5s ease-out 0.3s forwards;
      transform: scaleX(-1) translateX(8px);
    }
    .laurel-text {
      opacity: 0;
      animation: laurelTextFadeIn 0.4s ease-out 0.7s forwards;
    }
    @keyframes slideUpFromBottom {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .promo-banner-animate {
      animation: slideUpFromBottom 0.4s ease-out forwards;
    }
    @keyframes foodImagePop {
      0% {
        transform: translateY(-50%) scale(0.6);
      }
      60% {
        transform: translateY(-50%) scale(1.25);
      }
      100% {
        transform: translateY(-50%) scale(1.2);
      }
    }
    .food-image-pop {
      animation: foodImagePop 0.5s ease-out forwards;
    }
  </style>
</head>

    // ========== PRODUCT CARD ==========
    function ProductCard({ meal, quantity, onAdd, onRemove, fullWidth = false }) {
      const [isEditing, setIsEditing] = useState(false);
      const editTimeoutRef = useRef(null);

      const handleAdd = () => {
        onAdd();
        setIsEditing(true);
        // Auto-hide stepper after 3 seconds of inactivity
        if (editTimeoutRef.current) clearTimeout(editTimeoutRef.current);
        editTimeoutRef.current = setTimeout(() => setIsEditing(false), 800);
      };

      const handleRemove = () => {
        onRemove();
        // Reset timeout
        if (editTimeoutRef.current) clearTimeout(editTimeoutRef.current);
        editTimeoutRef.current = setTimeout(() => setIsEditing(false), 800);
      };

      const handleBadgeClick = () => {
        setIsEditing(true);
        if (editTimeoutRef.current) clearTimeout(editTimeoutRef.current);
        editTimeoutRef.current = setTimeout(() => setIsEditing(false), 800);
      };

      // Close editing when quantity becomes 0
      useEffect(() => {
        if (quantity === 0) setIsEditing(false);
      }, [quantity]);

      // Quantity control component (shared between layouts)
      const QuantityControl = () => (
        <div style={{ position: 'absolute', top: 0, right: 0 }}>
          {quantity === 0 ? (
            <button onClick={handleAdd} style={{
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              width: 36,
              height: 36,
              background: 'var(--color-stepper-bg)',
              border: 'none',
              borderRadius: '0 8px 0 8px',
              cursor: 'pointer',
            }}>
              {Icons.plus(16, 'black')}
            </button>
          ) : isEditing ? (
            <div style={{
              display: 'flex',
              alignItems: 'center',
              background: 'var(--color-stepper-bg)',
              border: 'none',
              borderRadius: '0 8px 0 8px',
              overflow: 'hidden',
            }}>
              <button onClick={handleRemove} style={{
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                width: 32, height: 34, background: 'transparent', border: 'none', cursor: 'pointer',
              }}>
                {Icons.minus(16, 'black')}
              </button>
              <span style={{
                width: 20, textAlign: 'center',
                fontFamily: 'var(--font-body)', fontSize: 'var(--fs-sm)', fontWeight: 700,
                color: 'black',
              }}>{quantity}</span>
              <button onClick={handleAdd} style={{
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                width: 32, height: 34, background: 'transparent', border: 'none', cursor: 'pointer',
              }}>
                {Icons.plus(16, 'black')}
              </button>
            </div>
          ) : (
            <button onClick={handleBadgeClick} style={{
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              width: 36,
              height: 36,
              background: 'var(--color-brand-primary)',
              border: 'none',
              borderRadius: '0 8px 0 8px',
              cursor: 'pointer',
              fontFamily: 'var(--font-body)',
              fontSize: 'var(--fs-sm)',
              fontWeight: 700,
              color: 'black',
            }}>
              {quantity}
            </button>
          )}
        </div>
      );

      // Full-width layout for Premium items - image with text overlay
      if (fullWidth) {
        return (
          <div style={{
            gridColumn: 'span 2',
            background: 'transparent',
          }}>
            {/* Full-width image */}
            <div style={{
              width: '100%',
              aspectRatio: '16/9',
              overflow: 'hidden',
              position: 'relative',
              background: '#e8dcd0',
              borderRadius: 12,
            }}>
              {meal.video ? (
                <video
                  src={meal.video}
                  autoPlay
                  loop
                  muted
                  playsInline
                  poster={meal.img}
                  style={{ width: '100%', height: '100%', objectFit: 'cover', borderRadius: 12 }}
                  onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling && (e.target.nextSibling.style.display = 'block'); }}
                />
              ) : null}
              <img
                src={meal.img}
                alt={meal.name}
                style={{ width: '100%', height: '100%', objectFit: 'cover', borderRadius: 12, display: meal.video ? 'none' : 'block' }}
                onError={(e) => { e.target.style.display = 'none'; }}
              />
              {/* Premium label - bottom left, with white background on top and right */}
              {meal.label && (
                <div style={{
                  position: 'absolute',
                  bottom: 0,
                  left: 0,
                  background: 'white',
                  padding: '2px 2px 0 0',
                  borderRadius: '0 6px 0 12px',
                }}>
                  <span style={{
                    display: 'inline-flex',
                    alignItems: 'center',
                    padding: '5px 10px',
                    borderRadius: '0 4px 0 12px',
                    background: '#024426',
                    color: 'white',
                    fontFamily: 'var(--font-body)',
                    fontSize: 10,
                    fontWeight: 700,
                    lineHeight: 1.2,
                    textTransform: 'uppercase',
                  }}>{meal.label}</span>
                </div>
              )}
              {/* Quantity control - top right */}
              <QuantityControl />
            </div>
            {/* Details below image - aligned with image edge */}
            <div style={{
              padding: '10px 0 4px 0',
              display: 'flex',
              flexDirection: 'column',
              gap: 4,
            }}>
              {/* Title row with ingredient badge on right */}

                display: 'flex',

                justifyContent: 'space-between',

                <span style={{
                  fontFamily: 'var(--font-headline)',

                  lineHeight: 1.2,

                  <span style={{
                    display: 'inline-flex',

                    <svg width="6" height="8" viewBox="0 0 10 12" fill="none">
                      <path d="M5 1C5 1 1 5 1 7.5C1 9.5 2.8 11 5 11C7.2 11 9 9.5 9 7.5C9 5 5 1 5 1Z" fill="black"/>
                    </svg>
                    <span style={{
                      fontFamily: 'var(--font-body)',
                      fontSize: 10,
                      fontWeight: 400,
                      color: 'black',

                )}
                {/* Organic tag - aligned right */}
                {meal.organicTag && (
                  <span style={{
                    display: 'inline-flex',
                    alignItems: 'center',
                    gap: 4,
                    padding: '3px 8px',
                    borderRadius: 'var(--radius-tag-pill)',
                    background: '#efe9de',
                    flexShrink: 0,
                  }}>
                    <img src="https://www.figma.com/api/mcp/asset/7da1392f-2ad3-4846-933b-58f120b05fa2" width="6" height="6" alt="" style={{ filter: 'brightness(0)' }} />

                      fontFamily: 'var(--font-body)',
                      fontSize: 10,
                      fontWeight: 400,
                      color: 'black',
                    }}>organic</span>
                  </span>
                )}
                {/* Premium ingredient badge with laurel animation */}
                {meal.highlightedIngredient && (
                  <span style={{
                    display: 'inline-flex',

                      <ellipse cx="2" cy="9" rx="1.8" ry="2.5" transform="rotate(-45 2 9)" fill="#8B7355"/>
                      <ellipse cx="3" cy="12" rx="1.8" ry="2.5" transform="rotate(-55 3 12)" fill="#8B7355"/>
                      <ellipse cx="5" cy="15" rx="1.5" ry="2" transform="rotate(-65 5 15)" fill="#8B7355"/>
                    </svg>
                    {/* Ingredient text */}
                    <span className="laurel-text" style={{
                      fontFamily: 'var(--font-body)',
                      fontSize: 9,
                      fontWeight: 700,
                      color: '#8B7355',
                      textTransform: 'uppercase',
                      letterSpacing: '0.5px',
                      margin: '0 2px',
                      whiteSpace: 'nowrap',
                    }}>
                      {meal.highlightedIngredient}
                    </span>
                    {/* Right laurel branch (mirrored) */}
                    <svg className="laurel-right" width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ flexShrink: 0 }}>
                      <path d="M10 19C10 19 9 15 7 12C5 9 3 7 3 7" stroke="#8B7355" strokeWidth="1" strokeLinecap="round"/>
                      <path d="M3 3C5 4.5 6 6 7 8" stroke="#8B7355" strokeWidth="1" strokeLinecap="round"/>
                      <ellipse cx="2" cy="3" rx="1.8" ry="2.5" transform="rotate(-20 2 3)" fill="#8B7355"/>
                      <ellipse cx="1.5" cy="6" rx="1.8" ry="2.5" transform="rotate(-35 1.5 6)" fill="#8B7355"/>
                      <ellipse cx="2" cy="9" rx="1.8" ry="2.5" transform="rotate(-45 2 9)" fill="#8B7355"/>
                      <ellipse cx="3" cy="12" rx="1.8" ry="2.5" transform="rotate(-55 3 12)" fill="#8B7355"/>
                      <ellipse cx="5" cy="15" rx="1.5" ry="2" transform="rotate(-65 5 15)" fill="#8B7355"/>

                  </span>

              {/* Rating Component */}

                <div style={{
                  display: 'flex',

                  <span style={{ color: '#656565' }}>({meal.reviewCount})</span>

              <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginTop: 2, justifyContent: 'space-between' }}>

    // ========== MEAL SELECTION GUIDANCE ==========
    function MealSelectionGuidance({ totalItems, mealsNeeded, onCartClick, isHidden, onContinue }) {
      const remaining = Math.max(0, mealsNeeded - totalItems);
      const isComplete = remaining === 0;
      const [isAnimating, setIsAnimating] = useState(false);
      const prevTotalRef = useRef(totalItems);

      useEffect(() => {
        if (prevTotalRef.current !== totalItems) {
          setIsAnimating(true);
          const timer = setTimeout(() => setIsAnimating(false), 400);
          prevTotalRef.current = totalItems;
          return () => clearTimeout(timer);
        }
      }, [totalItems]);

      return (
        <div style={{
          position: 'absolute',
          bottom: 83,
          left: 8,
          right: 8,
          background: 'var(--color-elevation-level-1)',
          borderRadius: 'var(--radius-md)',
          padding: 16,
          display: 'flex',
          flexDirection: 'column',
          gap: 16,
          zIndex: 10,
          opacity: isHidden ? 0 : 1,
          transform: isHidden ? 'translateY(20px)' : 'translateY(0)',
          transition: 'opacity 0.2s ease, transform 0.2s ease',
          pointerEvents: isHidden ? 'none' : 'auto',
        }}>
          {/* Action row */}
          <div style={{ display: 'flex', gap: 8, alignItems: 'stretch' }}>
            {/* Cart CTA */}
            <button
              onClick={onCartClick}
              style={{
              display: 'flex',
              alignItems: 'center',
              gap: 8,
              padding: '8px 24px',
              border: '1px solid black',
              borderRadius: 'var(--radius-button)',
              background: 'var(--color-elevation-level-1)',
              cursor: 'pointer',
              position: 'relative',
              flexShrink: 0,
            }}>
              {Icons.cart(24, 'black')}

              {/* Badge */}
              {totalItems >= 0 && (
                <span
                  className={isAnimating ? 'badge-pulse' : ''}
                  style={{
                    position: 'absolute',
                    top: 0,
                    left: 35,
                    display: 'inline-flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    minWidth: 20,

            {/* Continue button */}

                fontWeight: 700,
                lineHeight: 'var(--lh-md)',
              }}>

          </div>
        </div>
      );

    // ========== MAIN APP ==========
    function App() {
      const [currentPage, setCurrentPage] = useState('home');
      const [cart, setCart] = useState({ 2: 1, 4: 1 });
      const [showCart, setShowCart] = useState(false);

      const totalItems = Object.values(cart).reduce((sum, q) => sum + q, 0);

      const handleNavClick = (label) => {
        if (label === 'Home') setCurrentPage('home');
        else if (label === 'Menu') setCurrentPage('menu');
        else alert(`Navigating to ${label}...`);
      };

      const addToCart = (id) => setCart(prev => ({ ...prev, [id]: (prev[id] || 0) + 1 }));
      const removeFromCart = (id) => setCart(prev => {
        const c = { ...prev };
        if (c[id] > 1) c[id] -= 1;
        else delete c[id];
        return c;
      });

      return (
        <div className="phone-frame">
          {currentPage === 'home' ? (
            <HomePage onNavigateToMenu={() => setCurrentPage('menu')} />
          ) : (
            <MenuPage
              cart={cart}
              setCart={setCart}
              onCartClick={() => setShowCart(true)}
            />
          )}

          <BottomNavigation
            onNavClick={handleNavClick}
            activePage={currentPage}
          />

          <CartDrawer
            isOpen={showCart}
            onClose={() => setShowCart(false)}
            cart={cart}
            mealsData={mealsData}
            onRemove={removeFromCart}
            onAdd={addToCart}
          />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
