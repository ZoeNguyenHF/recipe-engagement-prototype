    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: #e8e8e8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
    }

    .phone-frame {
      width: 375px;
      height: 812px;
      background: var(--color-page-bg);
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    /* Zest Design System Tokens */
    :root {
      /* Page / Elevation */
      --color-page-bg: #faf8f3;
      --color-elevation-bg: #faf8f3;
      --color-elevation-level-1: #efe9de;
      --color-elevation-level-2: #e0d9cb;
      --color-factor-carbon-100: #f9f9f3;

      /* Neutral foreground */
      --color-neutral-fg-darkest: #024426;
      --color-neutral-fg-default: #242424;
      --color-neutral-fg-darker: #454545;
      --color-neutral-fg-base-alt: #4b4b4b;
      --color-neutral-fg-inverse: #ffffff;
      --color-neutral-fg-unselected: #656565;

      /* Brand */
      --color-brand-primary: #bbf06a;
      --color-brand-green-500: #067a46;
      --color-brand-border-subtle: #8ccf9a;
      --color-selected-bg-primary: #bbf06a;

      /* Tags */
      --color-tag-interactive-bg: #efe9de;
      --color-tag-interactive-fg: #242424;
      --color-tag-static-bg-v0: #e0d9cb;
      --color-tag-static-fg-v0: #024426;
      --color-tag-static-bg-v1: #db1d1d;
      --color-tag-static-fg-v1: #ffffff;
      --color-tag-static-bg-v2: #067a46;
      --color-tag-static-fg-v2: #ffffff;

      /* Divider */
      --color-divider: #c1c1c1;

      /* Bottom nav */
      --color-bottom-nav-bg: #e0d9cb;
      --color-bottom-nav-fg-selected: #024426;
      --color-bottom-nav-fg-unselected: #656565;

      /* Button */
      --color-button-brand-bg-disabled: #adadad;
      --color-button-brand-fg: #ffffff;
      --color-button-border: #024426;

      /* Badge */
      --color-badge-positive-bg: #007838;
      --color-badge-border: #faf8f3;
      --color-badge-fg: #ffffff;

      /* Number stepper */
      --color-stepper-bg: #efe9de;
      --color-stepper-border: #024426;
      --color-stepper-selected-bg: #efe9de;

      /* Icon button toggle */
      --color-icon-btn-toggle-bg: #024426;
      --color-icon-btn-toggle-fg: #ffffff;

      /* Benefits */
      --color-benefits: #b5e7ba;
      --color-purple-100: #f7e9ff;

      /* Tab group */
      --color-tab-fg-selected: #024426;
      --color-tab-fg-unselected: #242424;
      --color-tab-border-selected: #024426;
      --color-tab-border-unselected: #e0e0e0;

      /* Dialog */
      --dialog-overlay: rgba(0, 0, 0, 0.5);

      /* Spacing */
      --spacing-none: 0px;
      --spacing-xxs: 4px;
      --spacing-xs: 8px;
      --spacing-sm-1: 12px;
      --spacing-sm-2: 16px;
      --spacing-md-1: 24px;

      /* Corner radius */
      --radius-card: 12px;
      --radius-button: 8px;
      --radius-tag-rect: 4px;
      --radius-tag-pill: 999px;
      --radius-stepper: 8px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-dialog: 16px;

      /* Typography */
      --font-body: 'Roboto', sans-serif;
      --font-headline: 'Roboto', sans-serif; /* Agrandir substitute */

      --lh-xs: 16px;
      --lh-sm: 20px;
      --lh-md: 24px;
      --lh-lg: 32px;

      --fs-xs: 12px;
      --fs-sm: 14px;
      --fs-md: 16px;
      --fs-lg: 20px;
      --fs-xl: 24px;
    }

    /* Scrollbar styling */
    .scroll-area::-webkit-scrollbar { display: none; }
    .scroll-area { -ms-overflow-style: none; scrollbar-width: none; }
    .h-scroll::-webkit-scrollbar { display: none; }
    .h-scroll { -ms-overflow-style: none; scrollbar-width: none; }

    /* Quality tag animation */
    @keyframes qualityFadeSlideIn {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(-10px) scale(0.8);
      }
      60% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1.1);
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
      }
    }
    @keyframes qualityWiggle {
      0%, 100% {
        transform: translateX(-50%) translateY(0) rotate(0deg);
      }
      20% {
        transform: translateX(calc(-50% + 3px)) translateY(0) rotate(2deg);
      }
      40% {
        transform: translateX(calc(-50% - 3px)) translateY(0) rotate(-2deg);
      }
      60% {
        transform: translateX(calc(-50% + 2px)) translateY(0) rotate(1deg);
      }
      80% {
        transform: translateX(calc(-50% - 2px)) translateY(0) rotate(-1deg);
      }
    }
    @keyframes qualityGlow {
      0%, 100% {
        box-shadow: 0 2px 8px rgba(6, 122, 70, 0.3);
      }
      50% {
        box-shadow: 0 4px 16px rgba(6, 122, 70, 0.6), 0 0 24px rgba(6, 122, 70, 0.3);
      }
    }
    @keyframes diamondSparkle {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
      25% { transform: scale(1.2) rotate(10deg); opacity: 1; }
      50% { transform: scale(1) rotate(0deg); opacity: 0.8; }
      75% { transform: scale(1.2) rotate(-10deg); opacity: 1; }
    }
    @keyframes sparkleFloat {
      0% { opacity: 0; transform: scale(0) translateY(0); }
      50% { opacity: 1; transform: scale(1) translateY(-5px); }
      100% { opacity: 0; transform: scale(0) translateY(-10px); }
    }
    .quality-tag {
      opacity: 0;
      animation: qualityFadeSlideIn 0.6s ease-out 1s forwards, qualityWiggle 0.5s ease-in-out 1.6s 2, qualityGlow 2s ease-in-out 2.5s 2;
    }
    .quality-icon {
      animation: diamondSparkle 1.5s ease-in-out 1.6s 3;
    }
    .sparkle-left, .sparkle-right {
      animation: sparkleFloat 0.8s ease-out 1.7s forwards;
    }

    /* Organic info drawer slide animation */
    @keyframes slideInFromRight {
      0% {
        transform: translateX(100%);
      }
      100% {
        transform: translateX(0);
      }
    }
    .organic-drawer-enter {
      animation: slideInFromRight 0.3s ease-out forwards;
    }
    @keyframes confetti-fall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(600px) rotate(720deg);
        opacity: 0;
      }
    }
    @keyframes badgePulse {
      0% { transform: scale(1); }
      40% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .badge-pulse {
      animation: badgePulse 0.3s ease-out;
    }
    @keyframes featureTagGlow {
      0%, 100% { box-shadow: 0 0 4px rgba(255, 213, 79, 0.4); }
      50% { box-shadow: 0 0 12px rgba(255, 213, 79, 0.8); }
    }
    .feature-tag-pulse {
      animation: featureTagGlow 2s ease-in-out infinite;
    }

    /* Laurel wreath animation for premium ingredients */
    @keyframes laurelSeparateLeft {
      0% { transform: translateX(8px); }
      100% { transform: translateX(0); }
    }
    @keyframes laurelSeparateRight {
      0% { transform: translateX(-8px); }
      100% { transform: translateX(0); }
    }
    @keyframes laurelTextFadeIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    .laurel-left {
      animation: laurelSeparateLeft 0.5s ease-out 0.3s forwards;
      transform: translateX(8px);
    }
    @keyframes laurelSeparateRightMirrored {
      0% { transform: scaleX(-1) translateX(8px); }
      100% { transform: scaleX(-1) translateX(0); }
    }
    .laurel-right {
      animation: laurelSeparateRightMirrored 0.5s ease-out 0.3s forwards;
      transform: scaleX(-1) translateX(8px);
    }
    .laurel-text {
      opacity: 0;
      animation: laurelTextFadeIn 0.4s ease-out 0.7s forwards;
    }
    @keyframes slideUpFromBottom {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .promo-banner-animate {
      animation: slideUpFromBottom 0.4s ease-out forwards;
    }
    @keyframes foodImagePop {
      0% {
        transform: translateY(-50%) scale(0.6);
      }
      60% {
        transform: translateY(-50%) scale(1.25);
      }
      100% {
        transform: translateY(-50%) scale(1.2);
      }
    }
    .food-image-pop {
      animation: foodImagePop 0.5s ease-out forwards;
    }
  </style>

    // ========== PRODUCT CARD ==========
    function ProductCard({ meal, quantity, onAdd, onRemove, fullWidth = false }) {
      const [isEditing, setIsEditing] = useState(false);
      const editTimeoutRef = useRef(null);

      const handleAdd = () => {
        onAdd();
        setIsEditing(true);
        // Auto-hide stepper after 3 seconds of inactivity
        if (editTimeoutRef.current) clearTimeout(editTimeoutRef.current);
        editTimeoutRef.current = setTimeout(() => setIsEditing(false), 800);
      };

      const handleRemove = () => {
        onRemove();
        // Reset timeout
        if (editTimeoutRef.current) clearTimeout(editTimeoutRef.current);
        editTimeoutRef.current = setTimeout(() => setIsEditing(false), 800);
      };

      const handleBadgeClick = () => {
        setIsEditing(true);
        if (editTimeoutRef.current) clearTimeout(editTimeoutRef.current);
        editTimeoutRef.current = setTimeout(() => setIsEditing(false), 800);
      };

      // Close editing when quantity becomes 0
      useEffect(() => {
        if (quantity === 0) setIsEditing(false);
      }, [quantity]);

      // Quantity control component (shared between layouts)
      const QuantityControl = () => (
        <div style={{ position: 'absolute', top: 0, right: 0 }}>
          {quantity === 0 ? (
            <button onClick={handleAdd} style={{
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              width: 36,
              height: 36,
              background: 'var(--color-stepper-bg)',
              border: 'none',
              borderRadius: '0 8px 0 8px',
              cursor: 'pointer',
            }}>
              {Icons.plus(16, 'var(--color-neutral-fg-darkest)')}
            </button>
          ) : isEditing ? (
            <div style={{
              display: 'flex',
              alignItems: 'center',
              background: 'var(--color-stepper-bg)',
              border: 'none',
              borderRadius: '0 8px 0 8px',
              overflow: 'hidden',
            }}>
              <button onClick={handleRemove} style={{
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                width: 32, height: 34, background: 'transparent', border: 'none', cursor: 'pointer',
              }}>
                {Icons.minus(16, 'var(--color-neutral-fg-darkest)')}
              </button>
              <span style={{
                width: 20, textAlign: 'center',
                fontFamily: 'var(--font-body)', fontSize: 'var(--fs-sm)', fontWeight: 700,
                color: 'var(--color-neutral-fg-darkest)',
              }}>{quantity}</span>
              <button onClick={handleAdd} style={{
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                width: 32, height: 34, background: 'transparent', border: 'none', cursor: 'pointer',
              }}>
                {Icons.plus(16, 'var(--color-neutral-fg-darkest)')}
              </button>
            </div>
          ) : (
            <button onClick={handleBadgeClick} style={{
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              width: 36,
              height: 36,
              background: 'var(--color-brand-primary)',
              border: 'none',
              borderRadius: '0 8px 0 8px',
              cursor: 'pointer',
              fontFamily: 'var(--font-body)',
              fontSize: 'var(--fs-sm)',
              fontWeight: 700,
              color: 'var(--color-neutral-fg-darkest)',
            }}>
              {quantity}
            </button>
          )}
        </div>
      );

      // Full-width layout for Premium items - image with text overlay
      if (fullWidth) {
        return (
          <div style={{
            gridColumn: 'span 2',
            background: 'transparent',
          }}>
            {/* Full-width image */}
            <div style={{
              width: '100%',
              aspectRatio: '16/9',
              overflow: 'hidden',
              position: 'relative',
              background: '#e8dcd0',
              borderRadius: 12,
            }}>
              {meal.video ? (
                <video
                  src={meal.video}
                  autoPlay
                  loop
                  muted
                  playsInline
                  poster={meal.img}
                  style={{ width: '100%', height: '100%', objectFit: 'cover', borderRadius: 12 }}

              ) : null}
              <img

              {/* Premium label - bottom left, with white background on top and right */}
              {meal.label && (
                <div style={{
                  position: 'absolute',
                  bottom: 0,
                  left: 0,
                  background: 'white',

                  borderRadius: '0 6px 0 12px',
                }}>
                  <span style={{

                      <ellipse cx="2" cy="9" rx="1.8" ry="2.5" transform="rotate(-45 2 9)" fill="#8B7355"/>
                      <ellipse cx="3" cy="12" rx="1.8" ry="2.5" transform="rotate(-55 3 12)" fill="#8B7355"/>
                      <ellipse cx="5" cy="15" rx="1.5" ry="2" transform="rotate(-65 5 15)" fill="#8B7355"/>

                  </span>

              </div>
              <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginTop: 2, justifyContent: 'space-between' }}>

                  <span style={{ fontSize: 4, color: '#666666' }}>●</span>
                  <span style={{
                    fontFamily: 'var(--font-body)',
                    fontSize: 11,
                    fontWeight: 400,
                    color: '#666666',
                  }}>{meal.kcal}</span>
                  <span style={{ fontSize: 4, color: '#666666' }}>●</span>
                  <span style={{
                    fontFamily: 'var(--font-body)',

    // ========== MEAL SELECTION GUIDANCE ==========
    function MealSelectionGuidance({ totalItems, mealsNeeded, onCartClick, isHidden, onContinue }) {
      const remaining = Math.max(0, mealsNeeded - totalItems);
      const isComplete = remaining === 0;
      const [isAnimating, setIsAnimating] = useState(false);
      const prevTotalRef = useRef(totalItems);

      useEffect(() => {
        if (prevTotalRef.current !== totalItems) {
          setIsAnimating(true);
          const timer = setTimeout(() => setIsAnimating(false), 400);
          prevTotalRef.current = totalItems;
          return () => clearTimeout(timer);
        }
      }, [totalItems]);

      return (
        <div style={{
          position: 'absolute',
          bottom: 83,
          left: 8,
          right: 8,
          background: 'var(--color-elevation-level-1)',
          borderRadius: 'var(--radius-md)',

          flexDirection: 'column',
          gap: 16,
          zIndex: 10,
          opacity: isHidden ? 0 : 1,
          transform: isHidden ? 'translateY(20px)' : 'translateY(0)',
          transition: 'opacity 0.2s ease, transform 0.2s ease',
          pointerEvents: isHidden ? 'none' : 'auto',
        }}>
          {/* Action row */}
          <div style={{ display: 'flex', gap: 8, alignItems: 'stretch' }}>
            {/* Cart CTA */}
            <button
              onClick={onCartClick}
              style={{

              gap: 8,
              padding: '8px 24px',

              position: 'relative',
              flexShrink: 0,
            }}>

                  <div style={{ display: 'flex', gap: 4, marginBottom: 24, justifyContent: 'center' }}>
                    {[
                      { label: 'Family', img: 'Food Image.png' },
                      { label: 'Ready to eat', img: 'Bento from Google Drive.png' },
                      { label: 'Gourmet', img: 'Kale Shrimp Salad.png' },
                      { label: 'Healthy', img: 'Food Health Image.png' },
                      { label: 'Low Calorie', img: 'Chicken Leg.png' },
                    ].map((cat, i) => (
                      <div key={i} style={{
                        display: 'flex',
                        flexDirection: 'column',
                        alignItems: 'center',
                        gap: 4,
                        width: 67,
                        cursor: 'pointer',
                      }}>
                        <div style={{
                          width: 67,
                          height: 67,
                          borderRadius: 12,
                          background: '#EFE9DE',
                          position: 'relative',
                          overflow: 'hidden',
                        }}>
                          <img
                            src={cat.img}
                            alt={cat.label}
                            style={{
                              position: 'absolute',
                              width: 58,
                              height: 58,
                              top: 5,
                              left: 4,
                              objectFit: 'cover',
                            }}
                          />
                        </div>
                        <span style={{
                          fontFamily: 'var(--font-body)',
                          fontSize: 'var(--fs-xs)',
                          fontWeight: 400,
                          color: 'black',
                          textAlign: 'center',
                        }}>{cat.label}</span>
                      </div>
                    ))}
                  </div>
                </div>

                {/* On sale this week section */}
                <div style={{ padding: '16px 0 24px', background: '#EFE9DE', margin: '40px -16px 0' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, padding: '0 16px' }}>
                    <h3 style={{
                      fontFamily: 'var(--font-headline)',
                      fontSize: 'var(--fs-lg)',
                      fontWeight: 700,
                      color: 'black',
                      margin: 0,
                      lineHeight: 1.3,
                    }}>On sale this week</h3>
                    <span style={{
                      fontFamily: 'var(--font-body)',
                      fontSize: 'var(--fs-sm)',
                      fontWeight: 700,
                      color: 'black',
                      textDecoration: 'underline',
                      whiteSpace: 'nowrap',
                      cursor: 'pointer',
                    }}>Show more</span>
                  </div>

                  <div style={{ display: 'flex', gap: 12, overflowX: 'auto', paddingLeft: 16, paddingRight: 16 }} className="h-scroll">
                    {[
                      { id: 'sale-1', name: 'Sesame Beef Noodle Stir-Fry', time: '25 min', kcal: '680 kcal', protein: '32g protein', newPrice: '$9.99', oldPrice: '$12.99', img: 'recipes/HelloFresh Main Image (15).jpg' },
                      { id: 'sale-2', name: 'Glazed Sirloin with Fresh Greens', time: '20 min', kcal: '720 kcal', protein: '38g protein', newPrice: '$10.49', oldPrice: '$13.99', img: 'recipes/HelloFresh Main Image (16).jpg' },
                      { id: 'sale-3', name: 'Crispy Chicken with Sweet Potato Wedges', time: '20 min', kcal: '520 kcal', protein: '28g protein', newPrice: '$11.49', oldPrice: '$14.99', img: 'recipes/HelloFresh Main Image (10).jpg' },
                      { id: 'sale-4', name: 'Pork Tacos with Lime Slaw', time: '25 min', kcal: '680 kcal', protein: '35g protein', newPrice: '$8.99', oldPrice: '$11.99', img: 'recipes/HelloFresh Main Image (11).jpg' },
                    ].map((meal) => (
                      <div key={meal.id} style={{
                        flexShrink: 0,
                        width: 160,
                        background: '#E0D9CB',
                        borderRadius: 12,
                        overflow: 'hidden',
                        display: 'flex',
                        flexDirection: 'column',
                      }}>
                        <div style={{
                          width: '100%',
                          aspectRatio: '1/1',
                          position: 'relative',
                        }}>
                          <img
                            src={meal.img}
                            alt={meal.name}
                            style={{ width: '100%', height: '100%', objectFit: 'cover' }}
                          />
                          {/* Stepper */}
                          <div style={{ position: 'absolute', top: 0, right: 0, zIndex: 5 }}>
                            {(cart[meal.id] || 0) === 0 ? (
                              <button
                                type="button"
                                onClick={(e) => {
                                  e.stopPropagation();
                                  setCart(prev => ({ ...prev, [meal.id]: 1 }));
                                  setOnSaleEditing(prev => ({ ...prev, [meal.id]: true }));
                                  if (onSaleTimeoutRef.current[meal.id]) clearTimeout(onSaleTimeoutRef.current[meal.id]);
                                  onSaleTimeoutRef.current[meal.id] = setTimeout(() => setOnSaleEditing(prev => ({ ...prev, [meal.id]: false })), 800);
                                }}
                                style={{
                                  display: 'flex',
                                  alignItems: 'center',
                                  justifyContent: 'center',
                                  width: 36,
                                  height: 36,
                                  background: 'var(--color-stepper-bg)',
                                  border: 'none',
                                  borderRadius: '0 12px 0 8px',
                                  cursor: 'pointer',
                                }}
                              >
                                {Icons.plus(16, 'black')}
                              </button>
                            ) : onSaleEditing[meal.id] ? (
                              <div style={{
                                display: 'flex',
                                alignItems: 'center',
                                background: 'var(--color-stepper-bg)',
                                borderRadius: '0 12px 0 8px',
                                overflow: 'hidden',
                                height: 36,
                              }}>
                                <button onClick={(e) => {
                                  e.stopPropagation();
                                  setCart(prev => {
                                    const c = { ...prev };
                                    if (c[meal.id] > 1) c[meal.id] -= 1;
                                    else delete c[meal.id];
                                    return c;
                                  });
                                  if (onSaleTimeoutRef.current[meal.id]) clearTimeout(onSaleTimeoutRef.current[meal.id]);
                                  onSaleTimeoutRef.current[meal.id] = setTimeout(() => setOnSaleEditing(prev => ({ ...prev, [meal.id]: false })), 800);
                                }} style={{
                                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                                  width: 36, height: 36, background: 'transparent', border: 'none', cursor: 'pointer',
                                }}>
                                  {Icons.minus(14, 'black')}
                                </button>
                                <span style={{ width: 20, textAlign: 'center', fontFamily: 'var(--font-body)', fontSize: 12, fontWeight: 700, color: 'black' }}>{cart[meal.id]}</span>
                                <button onClick={(e) => {
                                  e.stopPropagation();
                                  setCart(prev => ({ ...prev, [meal.id]: (prev[meal.id] || 0) + 1 }));
                                  if (onSaleTimeoutRef.current[meal.id]) clearTimeout(onSaleTimeoutRef.current[meal.id]);
                                  onSaleTimeoutRef.current[meal.id] = setTimeout(() => setOnSaleEditing(prev => ({ ...prev, [meal.id]: false })), 800);
                                }} style={{
                                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                                  width: 36, height: 36, background: 'transparent', border: 'none', cursor: 'pointer',
                                }}>
                                  {Icons.plus(14, 'black')}
                                </button>
                              </div>
                            ) : (
                              <button onClick={(e) => {
                                e.stopPropagation();
                                setOnSaleEditing(prev => ({ ...prev, [meal.id]: true }));
                                if (onSaleTimeoutRef.current[meal.id]) clearTimeout(onSaleTimeoutRef.current[meal.id]);
                                onSaleTimeoutRef.current[meal.id] = setTimeout(() => setOnSaleEditing(prev => ({ ...prev, [meal.id]: false })), 800);
                              }} style={{
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                width: 36,
                                height: 36,
                                background: 'var(--color-brand-primary)',
                                border: 'none',
                                borderRadius: '0 12px 0 8px',
                                cursor: 'pointer',
                              }}>
                                <span style={{
                                  fontFamily: 'var(--font-body)',
                                  fontSize: 'var(--fs-sm)',
                                  fontWeight: 700,
                                  color: 'black',
                                }}>{cart[meal.id]}</span>
                              </button>
                            )}
                          </div>
                        </div>
                        {/* Text content below image */}
                        <div style={{ padding: 12, background: 'rgba(255, 255, 255, 0.7)', flex: 1 }}>
                          <div style={{
                            fontFamily: 'var(--font-body)',
                            fontSize: 'var(--fs-sm)',
                            fontWeight: 700,
                            color: 'black',
                            marginBottom: 4,
                            lineHeight: 1.3,
                          }}>{meal.name}</div>
                          <div style={{
                            fontFamily: 'var(--font-body)',
                            fontSize: 11,
                            color: '#666666',
                            marginBottom: 4,
                          }}>{meal.time} · {meal.kcal} · {meal.protein}</div>
                          <div style={{
                            fontFamily: 'var(--font-body)',
                            fontSize: 11,
                            color: '#666666',
                          }}><span style={{ fontWeight: 700, color: '#db1d1d' }}>{meal.newPrice}</span> <span style={{ textDecoration: 'line-through' }}>{meal.oldPrice}</span> per serving</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* Floating bottom bar with cart */}
              <div style={{
                position: 'absolute',
                bottom: 83,
                left: 8,
                right: 8,
                background: 'var(--color-elevation-level-1)',
                borderRadius: 'var(--radius-md)',
                padding: 16,
                display: 'flex',
                flexDirection: 'column',
                gap: 16,
                zIndex: 10,
              }}>
                {/* Action row */}
                <div style={{ display: 'flex', gap: 8, alignItems: 'stretch' }}>
                  {/* Cart CTA */}
                  <button
                    onClick={onCartClick}
                    style={{
                      display: 'flex',
                      alignItems: 'center',
                      gap: 8,
                      padding: '8px 24px',
                      border: '1px solid black',
                      borderRadius: 'var(--radius-button)',
                      background: 'var(--color-elevation-level-1)',
                      cursor: 'pointer',
                      position: 'relative',
                      flexShrink: 0,
                    }}
                  >
                    {Icons.cart(24, 'black')}
                    {totalItems >= 0 && (
                      <span style={{
                        position: 'absolute',
                        top: 0,
                        left: 35,
                        display: 'inline-flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        minWidth: 20,
                        height: 20,
                        padding: '0 6px',
                        background: 'var(--color-badge-positive-bg)',
                        color: 'var(--color-badge-fg)',
                        borderRadius: 'var(--radius-tag-pill)',
                        border: '2px solid var(--color-badge-border)',
                        fontFamily: 'var(--font-body)',
                        fontSize: 'var(--fs-xs)',
                        fontWeight: 700,
                      }}>{totalItems}</span>
                    )}
                  </button>

                  {/* Continue button */}
                  <button
                    onClick={() => setShowCategoriesPage(false)}
                    style={{
                      flex: 1,
                      display: 'flex',
                      alignItems: 'center',
                      justifyContent: 'center',
                      gap: 8,
                      padding: '8px 24px',
                      minWidth: 88,
                      border: 'none',
                      borderRadius: 'var(--radius-button)',
                      background: 'black',
                      color: 'white',
                      cursor: 'pointer',
                      fontFamily: 'var(--font-body)',
                      fontSize: 'var(--fs-md)',
                      fontWeight: 700,
                      lineHeight: 'var(--lh-md)',
                    }}
                  >
                    Continue
                  </button>
                </div>
              </div>

              {/* Bottom Navigation */}
              <div style={{
                position: 'absolute',
                bottom: 0,
                left: 0,
                right: 0,
                background: 'var(--color-bottom-nav-bg)',
                zIndex: 20,
              }}>
                {/* Divider */}
                <div style={{ height: 1, background: 'var(--color-divider)' }} />

                <div style={{
                  display: 'flex',
                  justifyContent: 'space-around',
                  padding: '4px 0',
                }}>
                  {[
                    { icon: 'home', label: 'Home' },
                    { icon: 'fork_knife', label: 'Menu' },
                    { icon: 'gift', label: 'HelloFriends' },
                    { icon: 'trophy', label: 'Rewards' },
                    { icon: 'profile', label: 'Profile' },
                  ].map((item, i) => {
                    const isActive = i === 1;
                    return (
                      <div
                        key={i}
                        onClick={() => setShowCategoriesPage(false)}
                        style={{
                          display: 'flex',
                          flexDirection: 'column',
                          alignItems: 'center',
                          padding: '4px 4px 4px',
                          cursor: isActive ? 'default' : 'pointer',
                          flex: 1,
                        }}
                      >
                        <div style={{
                          width: 48,
                          height: 24,
                          borderRadius: 'var(--radius-tag-pill)',
                          background: isActive ? 'var(--color-selected-bg-primary)' : 'transparent',
                          display: 'flex',
                          alignItems: 'center',
                          justifyContent: 'center',
                        }}>
                          {Icons[item.icon](20, isActive ? 'var(--color-bottom-nav-fg-selected)' : 'var(--color-bottom-nav-fg-unselected)')}
                        </div>
                        <span style={{
                          fontFamily: 'var(--font-body)',
                          fontSize: 'var(--fs-xs)',
                          fontWeight: 700,
                          lineHeight: 'var(--lh-xs)',
                          color: isActive ? 'var(--color-bottom-nav-fg-selected)' : 'var(--color-bottom-nav-fg-unselected)',
                          textAlign: 'center',
                        }}>{item.label}</span>
                      </div>
                    );
                  })}
                </div>

                {/* Home indicator */}
                <div style={{ display: 'flex', justifyContent: 'center', paddingBottom: 8, paddingTop: 4 }}>
                  <div style={{ width: 134, height: 5, background: 'black', borderRadius: 100 }} />
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    // ========== MAIN APP ==========
    function App() {
      const [currentPage, setCurrentPage] = useState('menu');
      const [cart, setCart] = useState({ 2: 1, 4: 1 });
      const [showCart, setShowCart] = useState(false);

      const totalItems = Object.values(cart).reduce((sum, q) => sum + q, 0);

      const handleNavClick = (label) => {
        if (label === 'Home') setCurrentPage('home');
        else if (label === 'Menu') setCurrentPage('menu');
        else alert(`Navigating to ${label}...`);
      };

      const addToCart = (id) => setCart(prev => ({ ...prev, [id]: (prev[id] || 0) + 1 }));
      const removeFromCart = (id) => setCart(prev => {
        const c = { ...prev };
        if (c[id] > 1) c[id] -= 1;
        else delete c[id];
        return c;
      });

      return (
        <div className="phone-frame">
          {currentPage === 'home' ? (
            <HomePage onNavigateToMenu={() => setCurrentPage('menu')} />
          ) : (
            <MenuPage
              cart={cart}
              setCart={setCart}
              onCartClick={() => setShowCart(true)}
            />
          )}

          <BottomNavigation
            onNavClick={handleNavClick}
            activePage={currentPage}
          />

          <CartDrawer
            isOpen={showCart}
            onClose={() => setShowCart(false)}
            cart={cart}
            mealsData={mealsData}
            onRemove={removeFromCart}
            onAdd={addToCart}
          />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
